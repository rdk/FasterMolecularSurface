plugins {
    // Apply the java-library plugin for API and implementation separation.
    id 'java-library'
    id 'maven-publish'
    // Statistically-rigorous benchmark harness (forks + warmup + CI). The legacy `benchmark` task is
    // kept alongside it for reproducing the historical numbers with the original method.
    id 'me.champeau.jmh' version '0.7.2'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testImplementation 'org.openscience.cdk:cdk-pdb:2.11'         // for PDBReader class

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    implementation 'org.slf4j:slf4j-api:2.0.17'

    implementation 'com.carrotsearch:hppc:0.10.0'

    // CDK on the PUBLIC API surface, so it lands on consumers' compile classpath (not just ours).
    // cdk-interfaces alone provides every CDK type that appears in a public signature - IAtom /
    // IAtomContainer (constructor args + getAtomSurfaceMap()) and CDKException (thrown by
    // getSurfacePoints/getSurfaceArea) - and it transitively pulls javax.vecmath, the home of Point3d
    // (the surface-point type returned across the API). Declaring it `api` lets a downstream project call
    // `new DistinctPackedNumericalSurfaceV2(atomContainer)` and read Point3d results without redeclaring
    // CDK itself and risking a version-skew NoSuchMethodError.
    api 'org.openscience.cdk:cdk-interfaces:2.11'                 // IAtom, IAtomContainer, CDKException, +vecmath/Point3d (public API)

    // CDK used only internally (never in a public signature), kept `implementation` to stay off
    // consumers' compile classpath: PeriodicTable (cdk-core), NumericalSurface + Tessellate
    // (cdk-qsarmolecular), the concrete Atom impl (cdk-silent).
    implementation 'org.openscience.cdk:cdk-core:2.11'           // PeriodicTable (internal)
    implementation 'org.openscience.cdk:cdk-qsarmolecular:2.11'  // NumericalSurface, Tessellate (internal)
    implementation 'org.openscience.cdk:cdk-silent:2.11'         // Atom (internal)

    // The JMH benchmark source set (src/jmh/java) reuses the test corpus + PDB loader and the shared
    // SurfaceCatalog registry, so it needs the test output + the test-only deps those classes pull in.
    jmhImplementation sourceSets.test.output
    jmhImplementation libs.junit.jupiter                          // TestStructures references JUnit Arguments
    jmhImplementation 'org.openscience.cdk:cdk-pdb:2.11'          // TestStructures' PDBReader at runtime
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        // Default 17 (the library's baseline JVM). CI passes -PjavaToolchain=<version> per matrix entry
        // so the build compiles and runs the tests on each target JVM (incl. GraalVM); without this the
        // pinned toolchain would run every matrix entry on 17. The published artifact is built with the
        // default 17 toolchain by the publish workflow.
        // Take the leading major component so a full version string (e.g. '21.0.1') doesn't throw;
        // CI passes bare majors ('17'/'21'/'25'/'26'), which pass through unchanged.
        languageVersion = JavaLanguageVersion.of((findProperty('javaToolchain') ?: '17').toString().tokenize('.')[0])
    }
}

// The Vectorized*OcclusionScan classes use the incubator Vector API (jdk.incubator.vector). It must be
// on the module graph to compile, and on the runtime module graph for the SIMD path to load; when it is
// absent (older JDK or a run without the flag) the surfaces' probeVector() returns false and they fall
// back to the scalar scan, so the module is a build/runtime enabler, not a hard requirement.
tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += ['--add-modules', 'jdk.incubator.vector']
}
tasks.withType(Test).configureEach {
    // The SIMD scans need the incubator module at runtime; pass -PnoVector to omit it and exercise the
    // scalar fallback path (probeVector() returns false, so the surfaces run their scalar scans).
    // Compilation always keeps the module (see JavaCompile config above).
    if (!project.hasProperty('noVector')) {
        jvmArgs '--add-modules', 'jdk.incubator.vector'
    }
}

tasks.named('test') {
    // Use JUnit Platform for unit tests. Benchmarks are opt-in via the 'benchmark' task.
    useJUnitPlatform {
        // 'benchmark' = the legacy timing harness; 'scorecard' = the opt-in accuracy/quality report.
        excludeTags 'benchmark', 'scorecard'
    }
    // Dev-ladder coverage, excluded by default (run the complete set with -PallTests, i.e.
    // ./unit-test-all.sh): the 19 per-rung DevSurfaceV* contract tests AND the cross-variant
    // equivalence harness that bit-for-bit re-verifies every rung against FasterNumericalSurface over
    // the whole corpus. Together these are the bulk of the suite's runtime (GridSoaEquivalenceTest alone
    // is ~125s). The production surfaces + FasterNumericalSurface keep their full contract coverage, and
    // the distinct/float surfaces keep their own equivalence-vs-Faster checks, in the default run.
    if (!project.hasProperty('allTests')) {
        exclude '**/DevSurfaceV*ContractTest.class'
        exclude '**/GridSoaEquivalenceTest.class'
        exclude '**/SoaEquivalenceTest.class'
    }
    // The cross-variant equivalence tests build full surfaces (incl. the ~4800-atom 4HHB at
    // tessellation level 4) for several variants across many parameter combinations, so the test
    // JVM needs more than the default heap.
    maxHeapSize = '2g'
    // Parallel test forks. Default 1 (single-threaded, the historical behavior). Override with
    // -PtestForks=N, or -PtestForks=auto for (CPU cores / 2). ./unit-test.sh pins 1; ./unit-test-all.sh
    // uses auto. Each fork can use up to maxHeapSize, so high fork counts raise peak memory.
    def testForks = (project.findProperty('testForks') ?: '1').toString()
    maxParallelForks = testForks == 'auto'
            ? Math.max(1, Runtime.runtime.availableProcessors().intdiv(2))
            : testForks.toInteger()
    // Forward the golden-baseline regeneration flag to the test JVM when present, along with the
    // absolute test-resources dir so the generator writes the CSV to the right place regardless of the
    // test working directory (e.g. when launched from an IDE rooted at the repo, not the lib/ module).
    if (System.getProperty('golden.regenerate') != null) {
        systemProperty 'golden.regenerate', System.getProperty('golden.regenerate')
        systemProperty 'golden.resourcesDir', file('src/test/resources').absolutePath
    }
}

// LEGACY opt-in performance benchmark (original median-of-3 wall-clock harness): ./gradlew benchmark
// Kept verbatim so the historical ladder numbers stay reproducible with the method that produced them.
// The new statistically-rigorous harness is `./gradlew jmh` (src/jmh/java, configured below).
tasks.register('benchmark', Test) {
    description = 'LEGACY @Tag("benchmark") median-of-3 harness (kept for historical reproducibility).'
    group = 'verification'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        includeTags 'benchmark'
    }
    maxHeapSize = '2g'
    testLogging {
        showStandardStreams = true
    }
    outputs.upToDateWhen { false }
}

// Opt-in accuracy + intrinsic-quality scorecard (per-variant, fidelity-tiered): ./gradlew scorecard
tasks.register('scorecard', Test) {
    description = 'Runs the @Tag("scorecard") accuracy + intrinsic point-quality report over the registry.'
    group = 'verification'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        includeTags 'scorecard'
    }
    maxHeapSize = '2g'
    testLogging {
        showStandardStreams = true
    }
    outputs.upToDateWhen { false }
}

// New JMH benchmark harness (src/jmh/java). Run: ./gradlew jmh   (results CSV under build/results/jmh/)
// Forks + warmup + measurement iterations give run-to-run variance/CI the legacy harness lacks, so a
// sub-1.1x rung can be told apart from turbo jitter. The SIMD scans need the incubator module at runtime.
jmh {
    jmhVersion = '1.37'
    jvmArgs = ['--add-modules', 'jdk.incubator.vector', '-Xmx2g']
    fork = 3
    warmupIterations = 5
    iterations = 10
    timeUnit = 'ms'
    resultFormat = 'CSV'
    resultsFile = file("$projectDir/build/results/jmh/results.csv")
    // To profile a run, uncomment one (async-profiler must be installed for the flamegraph):
    // profilers = ['gc', 'perfnorm']
    // profilers = ['async:libPath=/path/to/libasyncProfiler.so;output=flamegraph']
}

base {
    // 'archivesBaseName' on jar{} was removed in Gradle 9; the base extension's archivesName replaces it
    archivesName = 'faster-molecular-surface'
}


group = 'cz.cuni.cusbg'
version = '1.5'
description = 'Java library with optimized implementation of NumericalSurface from CDK'




publishing {
    publications {
        library(MavenPublication) {
            artifactId = 'faster-molecular-surface'

            from components.java
        }
    }

    repositories {
        maven {
            name = "GitHubPackages"
            url = "https://maven.pkg.github.com/rdk/FasterMolecularSurface"
            credentials {
                username = System.getenv("GITHUB_ACTOR")
                password = System.getenv("GITHUB_TOKEN")
            }
        }
    }
}