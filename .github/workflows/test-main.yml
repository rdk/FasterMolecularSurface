name: Test Main Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  build: 

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-latest ]
        # Gradle 9.x requires JDK 17+ to run. The Java 11 toolchain (see lib/build.gradle)
        # still targets Java 11 bytecode regardless of which JDK runs Gradle, so dropping 11
        # here does not weaken the release-compatibility guarantee.
        java-version: [ '17', '21', '22' ]

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        build-scan-publish: true
        build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
        build-scan-terms-of-use-agree: "yes"

    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v3

    - name: Check dependencies
      run: ./gradlew dependencies

    - name: Build with Gradle
      run: ./gradlew assemble
      
    - name: Run unit tests
      run: ./gradlew test
