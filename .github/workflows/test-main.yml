name: Test Main Build

on:
  push:
    branches: [ main ]
  pull_request:          # any base branch, so feature branches get CI on their PR
  workflow_dispatch:     # allow manual runs

# Cancel superseded in-progress runs on the same ref (saves CI minutes on rapid pushes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the build only needs to read the repo.
permissions:
  contents: read

jobs:
  # Supply-chain check: verify gradle-wrapper.jar against the known-good checksums, once.
  validate-wrapper:
    name: Validate Gradle wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: gradle/actions/wrapper-validation@v5

  build:
    name: Test (Java ${{ matrix.java-version }} / ${{ matrix.distribution }} / ${{ matrix.os }})
    needs: validate-wrapper
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false      # report every JVM's result, not just the first failure
      matrix:
        os: [ ubuntu-latest ]
        java-version: [ '17', '21', '25', '26' ]   # toolchain min, LTS, deployment, next
        distribution: [ 'temurin' ]
        include:
          # Deployment JVM: GraalVM (Graal JIT). The float-verdict path is JIT-dependent
          # (see docs/performance-lessons.md, lesson 5), so cover it explicitly.
          - os: ubuntu-latest
            java-version: '25'
            distribution: 'graalvm'
          # Apple Silicon: NEON, a different vector ISA than x86 AVX - exercises the SIMD path off x86.
          - os: macos-latest
            java-version: '25'
            distribution: 'temurin'
          # Windows: different OS (path handling, line endings, Gradle process model) on x86.
          - os: windows-latest
            java-version: '25'
            distribution: 'temurin'
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK ${{ matrix.java-version }} (${{ matrix.distribution }})
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: ${{ matrix.distribution }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      # `build` runs assemble + check (= test), replacing the separate assemble/test/dependencies steps.
      # -PjavaToolchain makes the toolchain follow the runner JDK (the default is pinned to 17, which
      # would otherwise run every matrix entry on 17); auto-download off so it uses the JDK set up above.
      - name: Build and test
        # bash is present on all three runner OSes (Git Bash on Windows), so `./gradlew`
        # works uniformly instead of falling back to PowerShell on windows-latest.
        shell: bash
        run: >-
          ./gradlew build
          -PjavaToolchain=${{ matrix.java-version }}
          -Dorg.gradle.java.installations.auto-download=false

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports-${{ matrix.os }}-${{ matrix.distribution }}-${{ matrix.java-version }}
          path: |
            lib/build/reports/tests/
            lib/build/test-results/
          retention-days: 7

  # Exercise the scalar (non-vectorized) scan path: CI runners have AVX, so the vectorized path is
  # always taken otherwise, and the scalar fallback would never be tested.
  scalar-fallback:
    name: Test (scalar fallback, no Vector API)
    needs: validate-wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      # -PnoVector drops --add-modules jdk.incubator.vector from the test JVM, so probeVector() fails and
      # the surfaces take their scalar scan path. Catches regressions the always-vectorized matrix misses.
      - name: Run tests without the Vector API
        run: >-
          ./gradlew test -PnoVector
          -PjavaToolchain=25
          -Dorg.gradle.java.installations.auto-download=false

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports-scalar-fallback
          path: |
            lib/build/reports/tests/
            lib/build/test-results/
          retention-days: 7

  # Full suite (-PallTests): the per-rung DevSurfaceV* contract tests AND the cross-variant equivalence
  # harness that bit-for-bit re-verifies every rung against FasterNumericalSurface. The default `test`
  # scope (and thus every matrix job above) excludes these, so without this job the project's central
  # correctness guarantee would be verified locally only. Slow (the equivalence harness dominates), so
  # it runs once, on the primary JVM.
  full-suite:
    name: Test (full suite, -PallTests)
    needs: validate-wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run the full test suite
        run: >-
          ./gradlew test -PallTests -PtestForks=auto
          -PjavaToolchain=25
          -Dorg.gradle.java.installations.auto-download=false

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports-full-suite
          path: |
            lib/build/reports/tests/
            lib/build/test-results/
          retention-days: 7
